<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <title>Weather App</title>
</head>

<body>
    <!-- Sezione HEADER DELLA PAGINA -->
    <header id="page-header">
        <section class="title-section">
            <h1 id="title">Weather app</h1>
        </section>
        <h3 id="subtitle-header">Il tuo servizio meteo gratuito</h3>
    </header>

    <main>
        <section class="container">
            <section class="box">
                <input class="input-citta" type="text" placeholder="Scrivi una città">
                <button class="btn-ricerca">Premi per avviare la ricerca</button>
            </section>
            
            <section id="output-api">
                <p id="citta">---</p>
                <p id="tempepratura">-- °C</p>
            </section>
        </section>
    </main>
    
</body>

</html>
